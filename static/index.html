<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Machine Inspection System</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="stylesheet" href="/app.css">
</head>
<body class="bg-slate-50 p-2 md:p-6">
  <div class="max-w-5xl mx-auto space-y-6">
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-slate-800">Machine Inspection</h2>
      <p class="text-slate-500 text-sm">Issue logging and inspection history</p>
    </div>

    <form id="mainForm" class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 space-y-4">
      <input type="hidden" id="inspection_id" name="inspection_id">
      <input type="hidden" id="existingUrl" name="existingUrl">
      <input type="hidden" id="removedImages" name="removed_images">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">A: Machine / เครื่องจักร</label>
          <input type="text" id="machine" name="machine" class="w-full border-2 rounded-xl p-3 focus:border-blue-500 outline-none transition" placeholder="Machine name or code / ระบุชื่อหรือรหัสเครื่อง" required>
          <div id="machineHistoryWrap" class="mt-3 hidden rounded-2xl border border-slate-200 bg-slate-50 p-3">
            <div class="text-xs font-bold uppercase tracking-wide text-slate-400">Recent Machines / ประวัติเครื่องจักรล่าสุด</div>
            <div id="machineHistoryList" class="mt-2 flex flex-wrap gap-2"></div>
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">B: Issue Images / รูปภาพความผิดปกติ</label>
          <div class="flex flex-col sm:flex-row gap-2">
            <button type="button" id="btnCamera" class="rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-3 text-sm font-bold transition">
              Capture / ถ่ายรูป
            </button>
            <button type="button" id="btnChooseFile" class="rounded-xl bg-blue-50 hover:bg-blue-100 text-blue-700 px-4 py-3 text-sm font-bold border border-blue-200 transition">
              Choose File / เลือกไฟล์
            </button>
          </div>
          <input type="file" id="cameraInput" accept="image/*" capture="environment" multiple class="hidden">
          <input type="file" id="fileInput" name="images" accept="image/*" multiple class="hidden">
          <div id="fileHint" class="mt-2 text-xs text-slate-500">ยังไม่ได้เลือกรูปใหม่ ระบบจะใช้รูปเดิมของรายการนี้ถ้ามี</div>
          <div id="previewText" class="mt-1 hidden text-xs text-green-700 font-bold">กำลังใช้รูปเดิมของรายการนี้</div>
        </div>

        <div class="md:col-span-2">
          <div id="imagePreviewCard" class="hidden rounded-2xl border border-slate-200 bg-slate-50 p-4">
            <div class="flex items-center justify-between gap-3 mb-3">
              <div>
                <div id="imagePreviewTitle" class="text-sm font-bold text-slate-700">ตัวอย่างรูปภาพ</div>
                <div id="imagePreviewMeta" class="text-xs text-slate-500">ยังไม่มีรูปที่เลือก</div>
              </div>
              <button type="button" id="clearSelectedImageBtn" class="hidden rounded-xl bg-white px-3 py-2 text-xs font-bold text-slate-600 border border-slate-200 hover:bg-slate-100">
                ล้างรูปที่เลือก
              </button>
            </div>
            <div id="imagePreviewGrid" class="grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-4"></div>
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">C: Issue / จุดที่ต้องแก้ไข</label>
          <input type="text" id="issue" name="issue" class="w-full border-2 rounded-xl p-3 focus:border-blue-500 outline-none transition" placeholder="Describe the issue / ระบุปัญหา">
          <div class="mt-3">
            <label class="block text-sm font-bold text-slate-700 mb-2">Severity / ระดับความรุนแรง</label>
            <div class="grid grid-cols-1 gap-2 sm:grid-cols-3">
              <label class="block cursor-pointer">
                <input type="radio" name="severity" value="ต่ำ" class="peer sr-only">
                <div class="rounded-2xl border-2 border-emerald-200 bg-emerald-50 px-4 py-3 text-emerald-700 transition peer-checked:border-emerald-600 peer-checked:bg-emerald-600 peer-checked:text-white peer-focus-visible:ring-4 peer-focus-visible:ring-emerald-200">
                  <div class="text-sm font-extrabold">Low / ต่ำ</div>
                  <div class="mt-1 text-xs opacity-80">Routine maintenance cycle / แก้ไขตามรอบงานปกติ</div>
                </div>
              </label>
              <label class="block cursor-pointer">
                <input type="radio" name="severity" value="กลาง" class="peer sr-only">
                <div class="rounded-2xl border-2 border-amber-200 bg-amber-50 px-4 py-3 text-amber-700 transition peer-checked:border-amber-500 peer-checked:bg-amber-500 peer-checked:text-white peer-focus-visible:ring-4 peer-focus-visible:ring-amber-200">
                  <div class="text-sm font-extrabold">Medium / กลาง</div>
                  <div class="mt-1 text-xs opacity-80">Plan corrective action soon / ควรวางแผนแก้ไขเร็วขึ้น</div>
                </div>
              </label>
              <label class="block cursor-pointer">
                <input type="radio" name="severity" value="สูง" class="peer sr-only">
                <div class="rounded-2xl border-2 border-rose-200 bg-rose-50 px-4 py-3 text-rose-700 transition peer-checked:border-rose-600 peer-checked:bg-rose-600 peer-checked:text-white peer-focus-visible:ring-4 peer-focus-visible:ring-rose-200">
                  <div class="text-sm font-extrabold">High / สูง</div>
                  <div class="mt-1 text-xs opacity-80">Urgent - fix immediately / เร่งด่วน ควรแก้ไขทันที</div>
                </div>
              </label>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">D: Note / หมายเหตุ</label>
          <input type="text" id="remark" name="remark" class="w-full border-2 rounded-xl p-3 focus:border-blue-500 outline-none transition" placeholder="Additional note / การดำเนินการเพิ่มเติม">
        </div>
      </div>

      <div id="formStatus" class="hidden rounded-2xl border px-4 py-3 text-sm font-medium" role="status" aria-live="polite"></div>

      <div class="flex gap-3 mt-4">
        <button type="submit" id="btnSubmit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold text-lg shadow-lg transition active:scale-95">
          Save / บันทึกข้อมูล
        </button>
        <button type="button" id="btnCancel" class="hidden bg-slate-400 hover:bg-slate-500 text-white px-8 rounded-2xl font-bold transition">
          Cancel / ยกเลิก
        </button>
        <button type="button" id="btnExport" class="bg-green-600 hover:bg-green-700 text-white px-8 rounded-2xl font-bold transition">
          📥 Export Excel
        </button>
      </div>
    </form>

    <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
      <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
        <h3 class="font-bold text-slate-700">Saved Records</h3>
        <button type="button" id="btnRefreshHistory" class="text-blue-600 text-sm hover:underline">Refresh</button>
      </div>
      <div class="border-b border-slate-200 bg-white p-4">
        <div class="grid grid-cols-1 gap-3 md:grid-cols-4">
          <div>
            <label for="historyMachineFilter" class="mb-1 block text-xs font-bold uppercase tracking-wide text-slate-400">Machine</label>
            <select id="historyMachineFilter" class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 focus:border-blue-500 focus:outline-none">
              <option value="">All</option>
            </select>
          </div>
          <div>
            <label for="historySeverityFilter" class="mb-1 block text-xs font-bold uppercase tracking-wide text-slate-400">Severity</label>
            <select id="historySeverityFilter" class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 focus:border-blue-500 focus:outline-none">
              <option value="">All</option>
              <option value="ต่ำ">Low</option>
              <option value="กลาง">Medium</option>
              <option value="สูง">High</option>
            </select>
          </div>
          <div>
            <label for="historySortOrder" class="mb-1 block text-xs font-bold uppercase tracking-wide text-slate-400">Sort</label>
            <select id="historySortOrder" class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 focus:border-blue-500 focus:outline-none">
              <option value="latest">Latest Date</option>
              <option value="machine-asc">Machine A-Z</option>
              <option value="machine-desc">Machine Z-A</option>
              <option value="severity-desc">Severity High-Low</option>
              <option value="severity-asc">Severity Low-High</option>
            </select>
          </div>
          <div class="flex items-end">
            <button type="button" id="clearHistoryFiltersBtn" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600 hover:bg-slate-100">
              Clear Filters
            </button>
          </div>
        </div>
      </div>

      <div id="historyCards" class="p-3 space-y-3 md:hidden"></div>

      <div class="table-container hidden md:block">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-100 text-xs uppercase text-slate-600 border-b">
              <th class="p-4 font-bold">Machine</th>
              <th class="p-4 font-bold">Images</th>
              <th class="p-4 font-bold">Issue</th>
              <th class="p-4 font-bold">Severity</th>
              <th class="p-4 font-bold">Note</th>
              <th class="p-4 font-bold">Date</th>
              <th class="p-4 font-bold text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="historyList" class="text-sm divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
