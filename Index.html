<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .table-container { overflow-x: auto; }
    table { min-width: 820px; }
  </style>
</head>
<body class="bg-slate-50 p-2 md:p-6">
  <div class="max-w-5xl mx-auto space-y-6">
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-slate-800">Machine Inspection</h2>
      <p class="text-slate-500 text-sm">ระบบบันทึกจุดที่ต้องแก้ไขและประวัติการตรวจเช็ค</p>
    </div>

    <form id="mainForm" class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 space-y-4">
      <input type="hidden" id="rowId" name="rowId">
      <input type="hidden" id="existingUrl" name="existingUrl">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">A: เครื่องจักร</label>
          <input type="text" id="machine" name="machine" class="w-full border-2 rounded-xl p-3 focus:border-blue-500 outline-none transition" placeholder="ระบุชื่อหรือรหัสเครื่อง" required>
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">B: รูปภาพความผิดปกติ</label>
          <div class="flex flex-col sm:flex-row gap-2">
            <button type="button" id="btnCamera" class="rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-3 text-sm font-bold transition">
              ถ่ายรูป
            </button>
            <button type="button" id="btnChooseFile" class="rounded-xl bg-blue-50 hover:bg-blue-100 text-blue-700 px-4 py-3 text-sm font-bold border border-blue-200 transition">
              เลือกไฟล์
            </button>
          </div>
          <input type="file" id="cameraInput" accept="image/*" capture="environment" multiple class="hidden">
          <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
          <div id="fileHint" class="mt-2 text-xs text-slate-500">ยังไม่ได้เลือกรูปใหม่ ระบบจะใช้รูปเดิมของรายการนี้ถ้ามี</div>
          <div id="previewText" class="mt-1 hidden text-xs text-green-700 font-bold">กำลังใช้รูปเดิมของรายการนี้</div>
        </div>

        <div class="md:col-span-2">
          <div id="imagePreviewCard" class="hidden rounded-2xl border border-slate-200 bg-slate-50 p-4">
            <div class="flex items-center justify-between gap-3 mb-3">
              <div>
                <div id="imagePreviewTitle" class="text-sm font-bold text-slate-700">ตัวอย่างรูปภาพ</div>
                <div id="imagePreviewMeta" class="text-xs text-slate-500">ยังไม่มีรูปที่เลือก</div>
              </div>
              <button type="button" id="clearSelectedImageBtn" class="hidden rounded-xl bg-white px-3 py-2 text-xs font-bold text-slate-600 border border-slate-200 hover:bg-slate-100">
                ล้างรูปที่เลือก
              </button>
            </div>
            <div id="imagePreviewGrid" class="grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-4"></div>
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">C: จุดที่ต้องแก้ไข</label>
          <input type="text" id="issue" name="issue" class="w-full border-2 rounded-xl p-3 focus:border-blue-500 outline-none transition" placeholder="ระบุปัญหา">
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">D: หมายเหตุ</label>
          <input type="text" id="remark" name="remark" class="w-full border-2 rounded-xl p-3 focus:border-blue-500 outline-none transition" placeholder="การดำเนินการเพิ่มเติม">
        </div>
      </div>

      <div id="formStatus" class="hidden rounded-2xl border px-4 py-3 text-sm font-medium" role="status" aria-live="polite"></div>
      <div id="preparedUploadInputs" class="hidden"></div>

      <div class="flex gap-3 mt-4">
        <button type="submit" id="btnSubmit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold text-lg shadow-lg transition active:scale-95">
          บันทึกข้อมูล
        </button>
        <button type="button" onclick="resetForm()" id="btnCancel" class="hidden bg-slate-400 hover:bg-slate-500 text-white px-8 rounded-2xl font-bold transition">
          ยกเลิก
        </button>
      </div>
    </form>

    <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
      <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
        <h3 class="font-bold text-slate-700">ประวัติรายการที่บันทึก</h3>
        <button onclick="loadHistory()" class="text-blue-600 text-sm hover:underline">รีเฟรชข้อมูล</button>
      </div>

      <div id="historyCards" class="p-3 space-y-3 md:hidden"></div>

      <div class="table-container hidden md:block">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-100 text-xs uppercase text-slate-600 border-b">
              <th class="p-4 font-bold">เครื่องจักร</th>
              <th class="p-4 font-bold">รูปภาพ</th>
              <th class="p-4 font-bold">จุดแก้ไข</th>
              <th class="p-4 font-bold">หมายเหตุ</th>
              <th class="p-4 font-bold">วันที่</th>
              <th class="p-4 font-bold text-center">จัดการ</th>
            </tr>
          </thead>
          <tbody id="historyList" class="text-sm divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("mainForm");
    const btnSubmit = document.getElementById("btnSubmit");
    const btnCancel = document.getElementById("btnCancel");
    const btnCamera = document.getElementById("btnCamera");
    const btnChooseFile = document.getElementById("btnChooseFile");
    const rowIdInput = document.getElementById("rowId");
    const existingUrlInput = document.getElementById("existingUrl");
    const cameraInput = document.getElementById("cameraInput");
    const fileInput = document.getElementById("fileInput");
    const fileHint = document.getElementById("fileHint");
    const previewText = document.getElementById("previewText");
    const formStatus = document.getElementById("formStatus");
    const imagePreviewCard = document.getElementById("imagePreviewCard");
    const imagePreviewTitle = document.getElementById("imagePreviewTitle");
    const imagePreviewMeta = document.getElementById("imagePreviewMeta");
    const imagePreviewGrid = document.getElementById("imagePreviewGrid");
    const clearSelectedImageBtn = document.getElementById("clearSelectedImageBtn");
    const preparedUploadInputs = document.getElementById("preparedUploadInputs");
    const historyCards = document.getElementById("historyCards");

    const MAX_IMAGE_DIMENSION = 1024;
    const TARGET_UPLOAD_SIZE_BYTES = 125 * 1024;
    const JPEG_QUALITY_STEPS = [0.76, 0.68, 0.6, 0.52, 0.44, 0.36, 0.28];
    const MIN_DIMENSION_FLOOR = 480;

    const state = {
      selectedFiles: [],
      localPreviewUrls: []
    };

    window.onload = loadHistory;
    btnCamera.addEventListener("click", function() {
      cameraInput.click();
    });
    btnChooseFile.addEventListener("click", function() {
      fileInput.click();
    });
    cameraInput.addEventListener("change", function() {
      appendSelectedFiles(cameraInput.files, "ถ่ายรูป");
    });
    fileInput.addEventListener("change", function() {
      appendSelectedFiles(fileInput.files, "เลือกไฟล์");
    });
    clearSelectedImageBtn.addEventListener("click", clearSelectedImages);

    function getSubmitLabel() {
      return rowIdInput.value ? "อัปเดตข้อมูล" : "บันทึกข้อมูล";
    }

    function setSubmitBusy(label) {
      btnSubmit.disabled = true;
      btnSubmit.innerText = label;
      btnSubmit.classList.add("opacity-80", "cursor-not-allowed");
    }

    function resetSubmitState() {
      btnSubmit.disabled = false;
      btnSubmit.innerText = getSubmitLabel();
      btnSubmit.classList.remove("opacity-80", "cursor-not-allowed");
    }

    function showStatus(type, message) {
      const styles = {
        info: "border-blue-200 bg-blue-50 text-blue-700",
        success: "border-green-200 bg-green-50 text-green-700",
        error: "border-rose-200 bg-rose-50 text-rose-700",
        warning: "border-amber-200 bg-amber-50 text-amber-700"
      };

      formStatus.className = "rounded-2xl border px-4 py-3 text-sm font-medium " + (styles[type] || styles.info);
      formStatus.textContent = message;
      formStatus.classList.remove("hidden");
    }

    function clearStatus() {
      formStatus.classList.add("hidden");
      formStatus.textContent = "";
    }

    function formatFileSize(bytes) {
      if (!bytes) {
        return "0 B";
      }
      if (bytes < 1024) {
        return bytes + " B";
      }
      if (bytes < 1024 * 1024) {
        return (bytes / 1024).toFixed(1) + " KB";
      }
      return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/'/g, "&#39;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function escapeJsString(value) {
      return String(value || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/\r/g, "\\r")
        .replace(/\n/g, "\\n")
        .replace(/\u2028/g, "\\u2028")
        .replace(/\u2029/g, "\\u2029");
    }

    function normalizeUrlList(value) {
      return String(value || "")
        .split(/\r?\n/)
        .map(function(item) {
          return item.trim();
        })
        .filter(Boolean);
    }

    function getExistingUrls() {
      return normalizeUrlList(existingUrlInput.value);
    }

    function makeFileKey(file) {
      return [file.name || "", file.size || 0, file.lastModified || 0].join("::");
    }

    function getDriveFileId(url) {
      const text = String(url || "");
      const patterns = [
        /\/file\/d\/([a-zA-Z0-9_-]+)/,
        /[?&]id=([a-zA-Z0-9_-]+)/,
        /\/open\?id=([a-zA-Z0-9_-]+)/,
        /\/thumbnail\?id=([a-zA-Z0-9_-]+)/
      ];

      for (let i = 0; i < patterns.length; i += 1) {
        const match = text.match(patterns[i]);
        if (match && match[1]) {
          return match[1];
        }
      }

      return "";
    }

    function getPreviewImageUrl(url) {
      const fileId = getDriveFileId(url);
      if (fileId) {
        return "https://drive.google.com/thumbnail?id=" + fileId + "&sz=w1000";
      }
      return url || "";
    }

    function revokeLocalPreviewUrls() {
      state.localPreviewUrls.forEach(function(url) {
        URL.revokeObjectURL(url);
      });
      state.localPreviewUrls = [];
    }
    function getImageDimensionsFromFile(file) {
      return new Promise(function(resolve, reject) {
        const previewUrl = URL.createObjectURL(file);
        const image = new Image();

        image.onload = function() {
          URL.revokeObjectURL(previewUrl);
          resolve({
            width: image.naturalWidth || image.width || 0,
            height: image.naturalHeight || image.height || 0
          });
        };

        image.onerror = function() {
          URL.revokeObjectURL(previewUrl);
          reject(new Error("อ่านขนาดรูปไม่สำเร็จ"));
        };

        image.src = previewUrl;
      });
    }

    function readFileAsDataUrl(file) {
      return new Promise(function(resolve, reject) {
        const reader = new FileReader();
        reader.onload = function(event) {
          resolve(event.target.result);
        };
        reader.onerror = function() {
          reject(new Error("อ่านไฟล์รูปไม่สำเร็จ"));
        };
        reader.readAsDataURL(file);
      });
    }

    function loadImageElement(src) {
      return new Promise(function(resolve, reject) {
        const image = new Image();
        image.onload = function() {
          resolve(image);
        };
        image.onerror = function() {
          reject(new Error("โหลดรูปเพื่อย่อขนาดไม่สำเร็จ"));
        };
        image.src = src;
      });
    }

    function canvasToBlob(canvas, mimeType, quality) {
      return new Promise(function(resolve, reject) {
        canvas.toBlob(function(blob) {
          if (blob) {
            resolve(blob);
            return;
          }
          reject(new Error("สร้างไฟล์รูปที่ย่อแล้วไม่สำเร็จ"));
        }, mimeType, quality);
      });
    }

    function drawResizedImageToCanvas(image, width, height) {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const context = canvas.getContext("2d");
      if (!context) {
        throw new Error("เบราว์เซอร์ไม่รองรับการย่อรูปในหน้านี้");
      }

      context.fillStyle = "#ffffff";
      context.fillRect(0, 0, width, height);
      context.drawImage(image, 0, 0, width, height);
      return canvas;
    }

    function canvasHasTransparency(canvas) {
      const context = canvas.getContext("2d", { willReadFrequently: true });
      if (!context) {
        return false;
      }

      const imageData = context.getImageData(0, 0, canvas.width, canvas.height).data;
      for (let i = 3; i < imageData.length; i += 4) {
        if (imageData[i] < 255) {
          return true;
        }
      }

      return false;
    }

    function makeUploadFileName(file, extension) {
      const baseName = String(file.name || "image")
        .replace(/\.[^.]+$/, "")
        .replace(/[^\w.\-() ]/g, "_");
      return baseName + "." + extension;
    }

    async function prepareUploadFile(file) {
      if (file.type === "image/gif") {
        const gifDimensions = await getImageDimensionsFromFile(file);
        return {
          file: file,
          originalSize: file.size || 0,
          compressedSize: file.size || 0,
          width: gifDimensions.width || 0,
          height: gifDimensions.height || 0,
          skippedCompression: true,
          note: "ใช้ GIF ต้นฉบับเพื่อรักษาภาพเคลื่อนไหว"
        };
      }

      const originalDataUrl = await readFileAsDataUrl(file);
      const image = await loadImageElement(originalDataUrl);
      let targetWidth = image.naturalWidth || image.width || 1;
      let targetHeight = image.naturalHeight || image.height || 1;
      const mayContainTransparency = file.type === "image/png" || file.type === "image/webp";

      if (
        file.size <= TARGET_UPLOAD_SIZE_BYTES &&
        targetWidth <= MAX_IMAGE_DIMENSION &&
        targetHeight <= MAX_IMAGE_DIMENSION
      ) {
        return {
          file: file,
          originalSize: file.size || 0,
          compressedSize: file.size || 0,
          width: targetWidth,
          height: targetHeight,
          skippedCompression: true,
          note: "ไฟล์เล็กอยู่แล้ว จึงข้ามการบีบอัดเพื่อให้อัปโหลดเร็วขึ้น"
        };
      }

      if (targetWidth > MAX_IMAGE_DIMENSION || targetHeight > MAX_IMAGE_DIMENSION) {
        const scale = Math.min(MAX_IMAGE_DIMENSION / targetWidth, MAX_IMAGE_DIMENSION / targetHeight);
        targetWidth = Math.max(1, Math.round(targetWidth * scale));
        targetHeight = Math.max(1, Math.round(targetHeight * scale));
      }

      let currentWidth = targetWidth;
      let currentHeight = targetHeight;

      while (true) {
        const canvas = drawResizedImageToCanvas(image, currentWidth, currentHeight);
        const hasTransparency = mayContainTransparency && canvasHasTransparency(canvas);

        if (hasTransparency) {
          const pngBlob = await canvasToBlob(canvas, "image/png");
          if (
            pngBlob.size <= TARGET_UPLOAD_SIZE_BYTES ||
            (currentWidth <= MIN_DIMENSION_FLOOR && currentHeight <= MIN_DIMENSION_FLOOR)
          ) {
            return {
              file: new File([pngBlob], makeUploadFileName(file, "png"), {
                type: "image/png",
                lastModified: Date.now()
              }),
              originalSize: file.size || 0,
              compressedSize: pngBlob.size || 0,
              width: currentWidth,
              height: currentHeight,
              skippedCompression: false,
              note: "เก็บ transparency ไว้โดยบันทึกเป็น PNG"
            };
          }

          currentWidth = Math.max(1, Math.round(currentWidth * 0.88));
          currentHeight = Math.max(1, Math.round(currentHeight * 0.88));
          continue;
        }

        let jpegBlob = null;
        for (let i = 0; i < JPEG_QUALITY_STEPS.length; i += 1) {
          jpegBlob = await canvasToBlob(canvas, "image/jpeg", JPEG_QUALITY_STEPS[i]);
          if (jpegBlob.size <= TARGET_UPLOAD_SIZE_BYTES) {
            break;
          }
        }

        if (
          jpegBlob &&
          (jpegBlob.size <= TARGET_UPLOAD_SIZE_BYTES ||
            (currentWidth <= MIN_DIMENSION_FLOOR && currentHeight <= MIN_DIMENSION_FLOOR))
        ) {
          return {
            file: new File([jpegBlob], makeUploadFileName(file, "jpg"), {
              type: "image/jpeg",
              lastModified: Date.now()
            }),
            originalSize: file.size || 0,
            compressedSize: jpegBlob.size || 0,
            width: currentWidth,
            height: currentHeight,
            skippedCompression: false,
            note: "ย่อและบีบอัดรูปก่อนอัปโหลด"
          };
        }

        currentWidth = Math.max(1, Math.round(currentWidth * 0.88));
        currentHeight = Math.max(1, Math.round(currentHeight * 0.88));
      }
    }

    function replaceFilesForSubmit(files) {
      if (typeof DataTransfer === "undefined") {
        throw new Error("เบราว์เซอร์นี้ไม่รองรับการเตรียมไฟล์หลายรูปก่อนอัปโหลด");
      }

      const transfer = new DataTransfer();
      [].concat(files || []).forEach(function(file) {
        transfer.items.add(file);
      });
      fileInput.files = transfer.files;
    }

    function clearPreparedUploadInputs() {
      preparedUploadInputs.innerHTML = "";
    }

    function buildPreparedUploadInputs(files) {
      clearPreparedUploadInputs();

      [].concat(files || []).forEach(function(file, index) {
        const input = document.createElement("input");
        const transfer = new DataTransfer();
        transfer.items.add(file);

        input.type = "file";
        input.name = "imageFile_" + index;
        input.className = "hidden";
        input.files = transfer.files;
        preparedUploadInputs.appendChild(input);
      });
    }

    function renderPreviewGallery(items, title, meta, isSelectedFile) {
      if (!items || items.length === 0) {
        hidePreviewGallery();
        return;
      }

      imagePreviewTitle.textContent = title;
      imagePreviewMeta.textContent = meta;
      imagePreviewGrid.innerHTML = "";

      items.forEach(function(item, index) {
        const wrapper = document.createElement(item.fullUrl ? "a" : "div");
        wrapper.className = "block overflow-hidden rounded-2xl border border-slate-200 bg-white";

        if (item.fullUrl) {
          wrapper.href = item.fullUrl;
          wrapper.target = "_blank";
          wrapper.rel = "noopener noreferrer";
        }

        const image = document.createElement("img");
        image.src = item.src;
        image.alt = item.label || ("Inspection image " + (index + 1));
        image.className = "h-32 w-full object-cover";
        wrapper.appendChild(image);

        imagePreviewGrid.appendChild(wrapper);
      });

      imagePreviewCard.classList.remove("hidden");
      clearSelectedImageBtn.classList.toggle("hidden", !isSelectedFile);
    }

    function hidePreviewGallery() {
      imagePreviewGrid.innerHTML = "";
      imagePreviewCard.classList.add("hidden");
      clearSelectedImageBtn.classList.add("hidden");
    }
    function renderSelectedPreview() {
      if (state.selectedFiles.length > 0) {
        revokeLocalPreviewUrls();

        const items = state.selectedFiles.map(function(file, index) {
          const previewUrl = URL.createObjectURL(file);
          state.localPreviewUrls.push(previewUrl);
          return {
            src: previewUrl,
            fullUrl: previewUrl,
            label: file.name || ("รูปที่ " + (index + 1))
          };
        });

        renderPreviewGallery(
          items,
          "ตัวอย่างรูปก่อนอัปโหลด",
          "เลือกรูปไว้ " + state.selectedFiles.length + " รูป",
          true
        );
        return;
      }

      const existingUrls = getExistingUrls();
      if (existingUrls.length > 0) {
        renderPreviewGallery(
          existingUrls.map(function(url, index) {
            return {
              src: getPreviewImageUrl(url),
              fullUrl: url,
              label: "รูปเดิม " + (index + 1)
            };
          }),
          "ตัวอย่างรูปเดิม",
          "กำลังใช้รูปเดิม " + existingUrls.length + " รูป",
          false
        );
        return;
      }

      hidePreviewGallery();
    }

    function updateFileHint() {
      if (state.selectedFiles.length > 0) {
        const totalSize = state.selectedFiles.reduce(function(sum, file) {
          return sum + (file.size || 0);
        }, 0);
        fileHint.textContent = "เลือกรูปใหม่ " + state.selectedFiles.length + " รูป (" + formatFileSize(totalSize) + ")";
        fileHint.className = "mt-2 text-xs text-blue-700 font-medium";
        return;
      }

      const existingUrls = getExistingUrls();
      if (existingUrls.length > 0) {
        fileHint.textContent = "ยังไม่ได้เลือกรูปใหม่ ระบบจะใช้รูปเดิม " + existingUrls.length + " รูป ของรายการนี้";
        fileHint.className = "mt-2 text-xs text-slate-500";
        return;
      }

      fileHint.textContent = "ยังไม่ได้เลือกรูปใหม่ สามารถบันทึกข้อมูลได้แม้ไม่มีรูป";
      fileHint.className = "mt-2 text-xs text-slate-500";
    }

    function clearInputBuffers() {
      cameraInput.value = "";
      fileInput.value = "";
    }

    function appendSelectedFiles(fileList, sourceLabel) {
      const incomingFiles = Array.from(fileList || []);
      if (incomingFiles.length === 0) {
        return;
      }

      const knownKeys = {};
      state.selectedFiles.forEach(function(file) {
        knownKeys[makeFileKey(file)] = true;
      });

      const uniqueIncoming = incomingFiles.filter(function(file) {
        const key = makeFileKey(file);
        if (knownKeys[key]) {
          return false;
        }

        knownKeys[key] = true;
        return true;
      });

      clearInputBuffers();

      if (uniqueIncoming.length === 0) {
        showStatus("warning", "ไฟล์ที่เลือกซ้ำกับรูปที่มีอยู่แล้ว");
        return;
      }

      state.selectedFiles = state.selectedFiles.concat(uniqueIncoming);
      previewText.classList.add("hidden");
      updateFileHint();
      renderSelectedPreview();
      showStatus("info", sourceLabel + " เพิ่มแล้ว " + uniqueIncoming.length + " รูป รวมทั้งหมด " + state.selectedFiles.length + " รูป");
    }

    function clearSelectedImages() {
      state.selectedFiles = [];
      revokeLocalPreviewUrls();
      clearInputBuffers();
      clearPreparedUploadInputs();
      updateFileHint();

      if (getExistingUrls().length > 0) {
        previewText.classList.remove("hidden");
        previewText.textContent = "กำลังใช้รูปเดิมของรายการนี้";
      } else {
        previewText.classList.add("hidden");
      }

      renderSelectedPreview();
      clearStatus();
      resetSubmitState();
    }

    function buildImageGalleryHtml(urls, imageClass, wrapperClass, maxVisible) {
      if (!urls || urls.length === 0) {
        return '<div class="rounded-xl border border-dashed border-slate-200 p-4 text-xs italic text-slate-300">ไม่มีรูป</div>';
      }

      const visibleUrls = urls.slice(0, maxVisible);
      const itemsHtml = visibleUrls.map(function(url, index) {
        const safeUrl = escapeHtml(url);
        const previewUrl = escapeHtml(getPreviewImageUrl(url));
        return '' +
          '<a href="' + safeUrl + '" target="_blank" rel="noopener noreferrer" class="' + wrapperClass + '">' +
            '<img src="' + previewUrl + '" alt="Inspection image ' + (index + 1) + '" class="' + imageClass + '">' +
          '</a>';
      }).join("");

      const moreBadge = urls.length > maxVisible
        ? '<div class="flex items-center justify-center rounded-xl border border-slate-200 bg-slate-50 text-xs font-bold text-slate-500">+' + (urls.length - maxVisible) + '</div>'
        : "";

      return itemsHtml + moreBadge;
    }

    function renderHistory(data) {
      const tbody = document.getElementById("historyList");
      tbody.innerHTML = "";
      historyCards.innerHTML = "";

      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-slate-400">ไม่พบประวัติการบันทึก</td></tr>';
        historyCards.innerHTML = '<div class="rounded-2xl border border-slate-200 bg-white p-6 text-center text-sm text-slate-400">ไม่พบประวัติการบันทึก</div>';
        return;
      }

      [].concat(data).reverse().forEach(function(row) {
        const dateStr = row[1] ? new Date(row[1]).toLocaleString("th-TH") : "-";
        const machineText = escapeHtml(row[2] || "-");
        const imageUrls = normalizeUrlList(row[3]);
        const issueText = escapeHtml(row[4] || "-");
        const remarkText = escapeHtml(row[5] || "-");

        const tr = document.createElement("tr");
        tr.className = "hover:bg-blue-50 transition-colors align-top";
        tr.innerHTML = `
          <td class="p-4 font-semibold text-slate-800">${machineText}</td>
          <td class="p-4">
            <div class="w-40">
              <div class="grid grid-cols-2 gap-2">
                ${buildImageGalleryHtml(imageUrls, "h-20 w-full object-cover", "block overflow-hidden rounded-xl border border-slate-200 bg-white hover:border-blue-300", 4)}
              </div>
              <div class="mt-2 text-[11px] font-bold text-slate-400">${imageUrls.length > 0 ? imageUrls.length + " รูป" : "ไม่มีรูป"}</div>
            </div>
          </td>
          <td class="p-4 text-slate-600 font-medium">${issueText}</td>
          <td class="p-4 text-slate-500 text-xs">${remarkText}</td>
          <td class="p-4 text-slate-400 text-[10px]">${dateStr}</td>
          <td class="p-4 text-center">
            <button onclick="editMode('${escapeJsString(row[0])}','${escapeJsString(row[2])}','${escapeJsString(row[3])}','${escapeJsString(row[4])}','${escapeJsString(row[5])}')"
                    class="bg-amber-100 text-amber-700 px-4 py-2 rounded-xl text-xs font-bold hover:bg-amber-200 transition">
              แก้ไข
            </button>
          </td>
        `;
        tbody.appendChild(tr);

        const card = document.createElement("div");
        card.className = "rounded-2xl border border-slate-200 bg-white p-4 shadow-sm";
        card.innerHTML = `
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="text-xs font-bold uppercase tracking-wide text-slate-400">เครื่องจักร</div>
              <div class="mt-1 text-sm font-semibold text-slate-800 break-words">${machineText}</div>
            </div>
            <button onclick="editMode('${escapeJsString(row[0])}','${escapeJsString(row[2])}','${escapeJsString(row[3])}','${escapeJsString(row[4])}','${escapeJsString(row[5])}')"
                    class="shrink-0 rounded-xl bg-amber-100 px-3 py-2 text-xs font-bold text-amber-700">
              แก้ไข
            </button>
          </div>
          <div class="mt-3">
            <div class="flex items-center justify-between gap-3">
              <div class="text-xs font-bold uppercase tracking-wide text-slate-400">รูปภาพ</div>
              <div class="text-[11px] font-bold text-slate-400">${imageUrls.length > 0 ? imageUrls.length + " รูป" : "ไม่มีรูป"}</div>
            </div>
            <div class="mt-2 grid grid-cols-2 gap-2">
              ${buildImageGalleryHtml(imageUrls, "h-28 w-full object-cover", "block overflow-hidden rounded-xl border border-slate-200 bg-white", 6)}
            </div>
          </div>
          <div class="mt-3 grid grid-cols-1 gap-3">
            <div>
              <div class="text-xs font-bold uppercase tracking-wide text-slate-400">จุดแก้ไข</div>
              <div class="mt-1 text-sm text-slate-700 break-words">${issueText}</div>
            </div>
            <div>
              <div class="text-xs font-bold uppercase tracking-wide text-slate-400">หมายเหตุ</div>
              <div class="mt-1 text-sm text-slate-500 break-words">${remarkText}</div>
            </div>
            <div>
              <div class="text-xs font-bold uppercase tracking-wide text-slate-400">วันที่</div>
              <div class="mt-1 text-xs text-slate-500">${dateStr}</div>
            </div>
          </div>
        `;
        historyCards.appendChild(card);
      });
    }
    function loadHistory() {
      const tbody = document.getElementById("historyList");
      tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-slate-400 italic">กำลังดึงข้อมูล...</td></tr>';
      historyCards.innerHTML = '<div class="rounded-2xl border border-slate-200 bg-white p-6 text-center text-sm text-slate-400">กำลังดึงข้อมูล...</div>';
      google.script.run.withSuccessHandler(renderHistory).getHistory();
    }

    function submitToServer() {
      google.script.run
        .withSuccessHandler(afterSave)
        .withFailureHandler(handleServerFailure)
        .processForm(form);
    }

    form.onsubmit = async function(e) {
      e.preventDefault();

      if (state.selectedFiles.length > 0) {
        try {
          const preparedEntries = [];
          let totalOriginalSize = 0;
          let totalCompressedSize = 0;
          let skippedCompressionCount = 0;

          for (let i = 0; i < state.selectedFiles.length; i += 1) {
            setSubmitBusy("กำลังเตรียมรูป " + (i + 1) + "/" + state.selectedFiles.length + "...");
            showStatus("info", "กำลังเตรียมรูป " + (i + 1) + "/" + state.selectedFiles.length);

            const prepared = await prepareUploadFile(state.selectedFiles[i]);
            preparedEntries.push(prepared);
            totalOriginalSize += prepared.originalSize || 0;
            totalCompressedSize += prepared.compressedSize || 0;
            if (prepared.skippedCompression) {
              skippedCompressionCount += 1;
            }
          }

          replaceFilesForSubmit(preparedEntries.map(function(item) {
            return item.file;
          }));
          buildPreparedUploadInputs(preparedEntries.map(function(item) {
            return item.file;
          }));

          renderSelectedPreview();
          imagePreviewMeta.textContent =
            "รวม " + preparedEntries.length + " รูป • " +
            formatFileSize(totalOriginalSize) + " -> " +
            formatFileSize(totalCompressedSize) +
            (skippedCompressionCount > 0 ? " • ข้ามการบีบอัด " + skippedCompressionCount + " รูป" : "");

          setSubmitBusy("กำลังอัปโหลดรูป...");
          showStatus("info", "กำลังอัปโหลดรูป " + preparedEntries.length + " ไฟล์และบันทึกข้อมูล");
          submitToServer();
        } catch (error) {
          showStatus("error", error && error.message ? error.message : "เตรียมรูปก่อนอัปโหลดไม่สำเร็จ");
          resetSubmitState();
        }
        return;
      }

      setSubmitBusy("กำลังบันทึกข้อมูล...");
      showStatus("info", "กำลังบันทึกข้อมูล");
      submitToServer();
    };

    function afterSave(msg) {
      if (String(msg).indexOf("Error") !== -1) {
        showStatus("error", "บันทึกไม่สำเร็จ: " + msg.replace(/^Error:\s*/, ""));
        resetSubmitState();
        return;
      }

      showStatus("success", rowIdInput.value ? "อัปเดตรายการเรียบร้อยแล้ว" : "บันทึกรายการเรียบร้อยแล้ว");
      resetForm(true);
      loadHistory();
    }

    function handleServerFailure(error) {
      const message = error && error.message ? error.message : String(error || "Unknown server error");
      showStatus("error", "ระบบไม่สามารถบันทึกข้อมูลได้: " + message);
      resetSubmitState();
    }

    function editMode(id, machine, url, issue, remark) {
      state.selectedFiles = [];
      revokeLocalPreviewUrls();
      clearInputBuffers();
      clearPreparedUploadInputs();
      rowIdInput.value = id;
      document.getElementById("machine").value = machine;
      existingUrlInput.value = url;
      document.getElementById("issue").value = issue;
      document.getElementById("remark").value = remark;

      btnSubmit.innerText = "อัปเดตข้อมูล";
      btnSubmit.className = "flex-1 bg-amber-600 hover:bg-amber-700 text-white p-4 rounded-2xl font-bold text-lg shadow-lg transition";
      btnCancel.classList.remove("hidden");

      const existingUrls = getExistingUrls();
      if (existingUrls.length > 0) {
        previewText.classList.remove("hidden");
        previewText.textContent = "หากไม่เลือกรูปใหม่ ระบบจะใช้รูปเดิม " + existingUrls.length + " รูป";
      } else {
        previewText.classList.add("hidden");
      }

      updateFileHint();
      renderSelectedPreview();
      showStatus("warning", "กำลังแก้ไขรายการเดิม หากเลือกรูปใหม่ ระบบจะใช้ชุดรูปใหม่แทนรูปเดิม");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetForm(preserveStatus) {
      form.reset();
      state.selectedFiles = [];
      revokeLocalPreviewUrls();
      clearInputBuffers();
      clearPreparedUploadInputs();
      rowIdInput.value = "";
      existingUrlInput.value = "";
      btnSubmit.innerText = "บันทึกข้อมูล";
      btnSubmit.className = "flex-1 bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold text-lg shadow-lg transition active:scale-95";
      btnCancel.classList.add("hidden");
      previewText.classList.add("hidden");
      hidePreviewGallery();
      updateFileHint();
      resetSubmitState();

      if (!preserveStatus) {
        clearStatus();
      }
    }

    updateFileHint();
  </script>
</body>
</html>
