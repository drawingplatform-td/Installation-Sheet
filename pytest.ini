[pytest]
testpaths = tests
norecursedirs = uploads node_modules __pycache__ .git .pytest_tmp
addopts =
    -p no:cacheprovider
    --basetemp=.pytest_tmp
    --cov=inspection_app
    --cov=database
    --cov-report=term-missing
    --cov-fail-under=80
pythonpath = .
filterwarnings =
    ignore:datetime.datetime.utcnow\(\) is deprecated:DeprecationWarning
